# Git-tracked inventory of the persistent OSAC CI runner fleet.
#
# This is the first git-tracked list of these hosts -- previously the
# hostnames only existed as prose examples scattered across docs/scripts.
# Confirm/adjust hostnames here to match reality before first use; verify
# with: ansible ci_runners -m ping
all:
  children:
    ci_runners:
      hosts:
        osac-ci-1: {}
        osac-3: {}
        osac-4: {}
        osac-5: {}
        osac-7: {}
        osac-8: {}
        osac-9: {}
        osac-10: {}
      vars:
        ansible_host: "{{ inventory_hostname }}.redhat.com"
        ansible_user: root
    # osac-ci-1 is also the dedicated monitoring-central host (see
    # .github/workflows/deploy-monitoring.yml and monitoring/README.md).
    # Kept as its own group here in case fleet playbooks ever need to treat
    # it differently (e.g. skip a step that would restart something the
    # monitoring stack depends on).
    monitoring_central:
      hosts:
        osac-ci-1: {}
