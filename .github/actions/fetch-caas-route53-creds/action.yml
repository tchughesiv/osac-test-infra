---
name: Fetch CaaS Route 53 credentials
description: >-
  Retrieve the AWS credentials the CaaS/Netris e2e flow uses for Route 53
  DNS management (infra/netris's ocp_dns role: ChangeResourceRecordSets/
  ListHostedZones/GetChange on the shared hosted zone) from Vault. Separate
  from fetch-ec2-runner-aws-creds, which is scoped to EC2 lifecycle actions
  only and has no Route 53 permissions at all -- confirmed directly against
  the live credential. Outputs are prefixed ROUTE53_ (unlike
  fetch-ec2-runner-aws-creds's bare AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY)
  specifically so a workflow using both actions can't silently wire the
  wrong credential into the wrong step via an identically-named output.
  Does not include aws_region -- infra/netris's own Makefile/ansible
  defaults to us-east-1 if neither the config file nor AWS_DEFAULT_REGION
  is set (see inventory/group_vars/all.yml), so a consumer needing a
  non-default region must supply it separately.

inputs:
  role-id:
    required: true
  secret-id:
    required: true

outputs:
  ROUTE53_AWS_ACCESS_KEY_ID:
    value: ${{ steps.vault.outputs.ROUTE53_AWS_ACCESS_KEY_ID }}
  ROUTE53_AWS_SECRET_ACCESS_KEY:
    value: ${{ steps.vault.outputs.ROUTE53_AWS_SECRET_ACCESS_KEY }}

runs:
  using: composite
  steps:
    - name: Retrieve Route 53 credentials from Vault
      id: vault
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
      with:
        url: http://127.0.0.1:8200
        method: approle
        roleId: ${{ inputs.role-id }}
        secretId: ${{ inputs.secret-id }}
        exportEnv: false
        secrets: |
          secret/data/osac/e2e/caas-route53-credentials access_key_id | ROUTE53_AWS_ACCESS_KEY_ID ;
          secret/data/osac/e2e/caas-route53-credentials secret_access_key | ROUTE53_AWS_SECRET_ACCESS_KEY
