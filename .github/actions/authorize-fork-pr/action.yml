---
name: Authorize fork PR
description: Fetch GitHub token from Vault and validate fork PR authorization

inputs:
  role-id:
    required: true
  secret-id:
    required: true
  fork-pr-author:
    required: true
  pr-number:
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Retrieve GitHub token from Vault
      id: vault-github
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
      with:
        url: http://127.0.0.1:8200
        method: approle
        roleId: ${{ inputs.role-id }}
        secretId: ${{ inputs.secret-id }}
        exportEnv: false
        secrets: |
          secret/data/osac/e2e/github-token token | GH_ORG_TOKEN

    - name: Validate fork PR authorization
      shell: bash
      env:
        PR_AUTHOR: ${{ inputs.fork-pr-author }}
        PR_NUMBER: ${{ inputs.pr-number }}
        PR_REPO: ${{ github.repository }}
        GH_TOKEN: ${{ steps.vault-github.outputs.GH_ORG_TOKEN }}
      run: |
        echo "::group::Check ok-to-test label"
        LABELS_FILE="${RUNNER_TEMP}/labels.json"
        if [[ -n "${PR_NUMBER}" ]]; then
          HTTP_CODE=$(curl -s -o "${LABELS_FILE}" -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${PR_REPO}/issues/${PR_NUMBER}/labels")
          if [[ "${HTTP_CODE}" == "200" ]]; then
            if jq -e '[.[].name] | index("ok-to-test")' "${LABELS_FILE}" > /dev/null 2>&1; then
              echo "Fork PR authorized: 'ok-to-test' label found on PR #${PR_NUMBER}."
              echo "::endgroup::"
              exit 0
            fi
          else
            echo "::warning::Failed to fetch labels for PR #${PR_NUMBER} (HTTP ${HTTP_CODE}), skipping label check."
          fi
        fi
        echo "::endgroup::"

        echo "::group::Check org membership"
        # URL-encode PR_AUTHOR -- bot accounts like "some-bot[bot]" contain
        # characters (`[`, `]`) that make the URL invalid otherwise, which
        # curl rejects outright (exit 3) before the request is even sent.
        PR_AUTHOR_ENCODED=$(jq -rn --arg v "${PR_AUTHOR}" '$v|@uri')
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/orgs/osac-project/members/${PR_AUTHOR_ENCODED}")
        if [[ "${HTTP_CODE}" == "204" ]]; then
          echo "Fork PR authorized: '${PR_AUTHOR}' is an osac-project org member."
          echo "::endgroup::"
          exit 0
        fi

        echo "::error::Fork PR blocked: '${PR_AUTHOR}' is not an osac-project org member."
        echo "::error::An org member can approve this PR for testing by commenting /ok-to-test"
        echo "::endgroup::"
        exit 1
