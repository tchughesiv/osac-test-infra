# Config for fleet/ (persistent CI-host management, see fleet/README.md).
# Previously pointed at inventory/roles/ directories that never existed --
# leftover from before infra/netris/ was carved out with its own self-
# contained ansible.cfg. fleet/ is the first real consumer of this file.
[defaults]
inventory = fleet/inventory
roles_path = fleet/roles
# Unlike infra/netris's ephemeral-per-run boxes, fleet hosts are long-lived --
# keep host-key verification on and rely on each admin's already-pinned
# known_hosts from routine SSH access.
host_key_checking = True
gathering = implicit
fact_caching = memory
fact_caching_timeout = 86400

# Logging configuration
log_path = ./ansible.log
display_skipped_hosts = False
display_ok_hosts = True

# Performance settings
forks = 5
timeout = 300
gather_timeout = 60

# Retry settings
retry_files_enabled = True
retry_files_save_path = ./retry

# Output settings
stdout_callback = default
stderr_callback = default
bin_ansible_callbacks = True
result_format = yaml

# SSH settings
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o ConnectTimeout=30

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o ConnectTimeout=30
pipelining = True
control_path_dir = /tmp/.ansible-cp

[privilege_escalation]
become = False

[persistent_connection]
connect_timeout = 30
connect_retry_timeout = 15
command_timeout = 300
